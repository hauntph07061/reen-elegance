server:
  port: 8080

spring:
  application:
    name: greenelegance-api

  datasource:
    url: jdbc:postgresql://localhost:5432/greenelegance
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  seo:
    base-url: ${APP_SEO_BASE_URL:https://green-elegance.web.app}

